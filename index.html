<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 6px;
    }

    button:hover {
      background: #357abd;
    }

    #message {
      margin-top: 20px;
      font-size: 24px;
      color: #333;
    }
  </style>
</head>
<body>
  <button onclick="document.getElementById('message').textContent = '你好世界'">点击我</button>
  <p id="message"></p>
</body>
</html>
