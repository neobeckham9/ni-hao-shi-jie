<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>神秘空间</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --text: #eaeaea;
      --text2: #aaa;
      --border: #2a2a4a;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      -webkit-text-size-adjust: 100%;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ─── NAV ─────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      padding-left: max(20px, env(safe-area-inset-left));
      padding-right: max(20px, env(safe-area-inset-right));
      padding-top: env(safe-area-inset-top);
      height: calc(56px + env(safe-area-inset-top));
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .nav-logo { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
    .nav-links { display: flex; gap: 12px; }
    .nav-btn {
      padding: 8px 16px;
      min-height: 36px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: all .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:hover, .nav-btn.active { background: var(--accent); border-color: var(--accent); }
    .nav-btn:active { opacity: 0.7; }
    .nav-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid var(--accent);
    }

    /* ─── PAGES ───────────────────────────── */
    .page {
      display: none; max-width: 680px; margin: 0 auto;
      padding: 24px 16px;
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
    }
    .page.active { display: block; }

    /* ─── CARD ────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    /* ─── AUTH PAGE ───────────────────────── */
    .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
    .auth-tab {
      flex: 1; padding: 12px; text-align: center; cursor: pointer;
      background: transparent; border: none; color: var(--text2); font-size: 15px; transition: all .2s;
    }
    .auth-tab.active { background: var(--accent); color: #fff; font-weight: 600; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text2); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 16px; /* 16px 防止 iOS 自动缩放 */
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    /* ─── BUTTONS ─────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 20px; border-radius: 10px; border: none; cursor: pointer;
      font-size: 15px; font-weight: 600; transition: all .2s; width: 100%;
      min-height: 44px; /* Apple HIG 最小触摸目标 */
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:active { opacity: .75; transform: scale(.98); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:active { opacity: .75; }
    .btn-sm { width: auto; padding: 8px 16px; font-size: 13px; min-height: 36px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ─── ERROR / SUCCESS ─────────────────── */
    .alert {
      padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
    }
    .alert-error { background: rgba(233,69,96,.15); border: 1px solid var(--accent); color: #ff6b87; }
    .alert-success { background: rgba(46,213,115,.15); border: 1px solid #2ed573; color: #2ed573; }

    /* ─── MYSTERIOUS COPY ─────────────────── */
    .mystery-banner {
      background: linear-gradient(135deg, var(--accent2), #1a1a4e);
      border: 1px solid #3a3a7a;
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .mystery-banner::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 70% 30%, rgba(233,69,96,.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .mystery-label { font-size: 11px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 16px; }
    .mystery-text {
      font-size: 20px; line-height: 1.6; color: var(--text); font-style: italic;
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height .5s ease, opacity .4s ease, margin .4s ease;
      margin-top: 0; white-space: pre-line;
    }
    .mystery-text.open { max-height: 300px; opacity: 1; margin-top: 16px; }
    .mystery-toggle {
      cursor: pointer; background: none; border: 1px solid var(--accent);
      color: var(--accent); border-radius: 20px; padding: 10px 28px;
      font-size: 14px; letter-spacing: 1px; transition: all .2s;
      min-height: 44px; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .mystery-toggle:hover { background: var(--accent); color: #fff; }
    .mystery-toggle:active { opacity: 0.7; transform: scale(.97); }

    /* ─── POST CARD ───────────────────────── */
    .post-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
    .post-header { display: flex; align-items: center; gap: 12px; padding: 16px; }
    .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
    .post-author { font-weight: 600; font-size: 14px; }
    .post-time { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .post-content { padding: 0 16px 16px; font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }
    .post-image { width: 100%; max-height: 400px; object-fit: cover; display: block; }

    /* ─── UPLOAD AREA ─────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s;
      background: var(--surface2);
    }
    .upload-zone:hover { border-color: var(--accent); }
    .upload-zone input[type=file] { display: none; }
    .upload-zone .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .upload-zone .upload-hint { font-size: 13px; color: var(--text2); }
    .upload-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-top: 12px; display: none; }

    /* ─── PROFILE ─────────────────────────── */
    .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .profile-avatar-wrap { position: relative; cursor: pointer; }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--accent);
    }
    .avatar-overlay {
      position: absolute; inset: 0; border-radius: 50%; background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; opacity: 0; transition: opacity .2s;
    }
    .profile-avatar-wrap:hover .avatar-overlay { opacity: 1; }
    .profile-name { font-size: 22px; font-weight: 700; }
    .profile-bio { font-size: 14px; color: var(--text2); margin-top: 4px; }

    /* ─── MYSTERY LIST ────────────────────── */
    .mystery-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .mystery-item:last-child { border-bottom: none; }
    .mystery-item-text { flex: 1; font-size: 14px; line-height: 1.6; color: var(--text); }
    .mystery-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ─── LOADER ──────────────────────────── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
    .text-center { text-align: center; }
    .text-sm { font-size: 13px; color: var(--text2); }
    .mt-12 { margin-top: 12px; }
    .mb-0 { margin-bottom: 0; }

    /* ─── RESPONSIVE / iPhone ────────────── */
    @media (max-width: 480px) {
      .profile-header { flex-direction: column; text-align: center; }
      .mystery-text { font-size: 17px; }
      .card { padding: 18px; border-radius: 14px; }
      .post-card { border-radius: 14px; }
      .nav-logo { font-size: 18px; }
      .profile-name { font-size: 20px; }
    }
    /* 支持圆角屏幕（iPhone X+）横屏 */
    @media (max-width: 900px) and (orientation: landscape) {
      .page {
        padding-left: max(16px, env(safe-area-inset-left));
        padding-right: max(16px, env(safe-area-inset-right));
      }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════ NAV -->
<nav>
  <span class="nav-logo">✦ 神秘空间</span>
  <div class="nav-links" id="navLinks">
    <button class="nav-btn" onclick="showPage('home')">首页</button>
    <button class="nav-btn hidden" id="navProfile" onclick="showPage('profile')">我的</button>
    <button class="nav-btn hidden" id="navLogout" onclick="logout()">退出</button>
    <button class="nav-btn" id="navLogin" onclick="showPage('auth')">登录</button>
  </div>
</nav>

<!-- ═══════════════════════════════════════════ AUTH PAGE -->
<div class="page" id="pageAuth">
  <div class="card" style="max-width:400px;margin:0 auto;">
    <h2 style="text-align:center;margin-bottom:20px;">欢迎回来</h2>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">登录</button>
      <button class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">注册</button>
    </div>
    <div id="authError" class="alert alert-error hidden"></div>
    <div id="authSuccess" class="alert alert-success hidden"></div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button class="btn btn-primary" type="submit" id="loginBtn">登录</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>昵称</label>
        <input type="text" id="regName" placeholder="起个有趣的名字" required>
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="regEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>密码（至少6位）</label>
        <input type="password" id="regPassword" placeholder="••••••••" required minlength="6">
      </div>
      <button class="btn btn-primary" type="submit" id="registerBtn">创建账号</button>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════════ HOME PAGE -->
<div class="page active" id="pageHome">
  <!-- Mystery banner -->
  <div class="mystery-banner">
    <div class="mystery-label">我知道你的秘密</div>
    <div class="mystery-text" id="mysteryDisplay"></div>
    <button class="mystery-toggle" id="mysteryToggle" onclick="toggleMystery()">打开</button>
  </div>

</div>

<!-- ═══════════════════════════════════════════ PROFILE PAGE -->
<div class="page" id="pageProfile">
  <div class="card">
    <div class="profile-header">
      <div class="profile-avatar-wrap">
        <img id="profileAvatar" class="profile-avatar" src="https://ui-avatars.com/api/?name=U&background=e94560&color=fff" alt="头像">
      </div>
      <div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-bio" id="profileBio">还没有简介</div>
      </div>
    </div>
    <button class="btn btn-secondary" onclick="showEditProfile()">✏️ 编辑资料</button>
  </div>

  <!-- Edit profile form -->
  <div class="card hidden" id="editProfileCard">
    <h3 style="margin-bottom:16px;">编辑资料</h3>
    <div id="profileError" class="alert alert-error hidden"></div>
    <div class="form-group">
      <label>昵称</label>
      <input type="text" id="editName" placeholder="你的名字">
    </div>
    <div class="form-group">
      <label>个人简介</label>
      <textarea id="editBio" placeholder="介绍一下自己..."></textarea>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" onclick="saveProfile()">保存</button>
      <button class="btn btn-secondary" onclick="hideEditProfile()">取消</button>
    </div>
  </div>

  <!-- Mystery copy manager -->
  <div class="card">
    <h3 style="margin-bottom:4px;">🔮 我的神秘文案库</h3>
    <p class="text-sm" style="margin-bottom:16px;">这些文案会随机出现在首页 · 你越写越多，随机池越神秘</p>

    <div class="form-group">
      <textarea id="newMystery" placeholder="写下你的神秘文案..." rows="2"></textarea>
    </div>
    <button class="btn btn-primary" onclick="addMystery()">+ 加入文案库</button>

    <div id="mysteryList" style="margin-top:20px;">
      <div class="text-sm text-center" style="padding:12px 0;">暂无文案，快来添加吧</div>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════════ FIREBASE + APP JS -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged, updateProfile
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, collection, doc, setDoc, getDoc, addDoc, getDocs,
  query, orderBy, where, deleteDoc, serverTimestamp, onSnapshot
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ──────────────────────────────────────────────
// 🔥 FIREBASE CONFIG — 替换为你的 Firebase 项目配置
// ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyA1TbHrNjaDtokYLp7VUwXU8fEupUFoQ0w",
  authDomain: "ni-hao-shi-jie-6158f.firebaseapp.com",
  projectId: "ni-hao-shi-jie-6158f",
  storageBucket: "ni-hao-shi-jie-6158f.firebasestorage.app",
  messagingSenderId: "703438702238",
  appId: "1:703438702238:web:5efb7ab375782a0dc35d8f",
  measurementId: "G-Z48F3EQH5V"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let currentUser = null;
let allMysteries = [];
let currentMysteryIndex = -1;
let unsubscribeMysteries = null;

// ──────────────────────────────────────────────
// AUTH STATE
// ──────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (user) {
    document.getElementById('navProfile').classList.remove('hidden');
    document.getElementById('navLogout').classList.remove('hidden');
    document.getElementById('navLogin').classList.add('hidden');
    await loadUserProfile(user.uid);
  } else {
    document.getElementById('navProfile').classList.add('hidden');
    document.getElementById('navLogout').classList.add('hidden');
    document.getElementById('navLogin').classList.remove('hidden');
  }
  loadMysteries();
});

// ──────────────────────────────────────────────
// PAGE NAVIGATION
// ──────────────────────────────────────────────
window.showPage = (name) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const map = { home: 'pageHome', auth: 'pageAuth', profile: 'pageProfile' };
  document.getElementById(map[name])?.classList.add('active');
  if (name === 'profile' && currentUser) {
    loadUserProfile(currentUser.uid);
    loadMyMysteries(currentUser.uid);
  }
};

// ──────────────────────────────────────────────
// AUTH TABS
// ──────────────────────────────────────────────
window.switchAuthTab = (tab) => {
  clearAuthMessages();
  if (tab === 'login') {
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabRegister').classList.remove('active');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('registerForm').classList.add('hidden');
  } else {
    document.getElementById('tabRegister').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('loginForm').classList.add('hidden');
  }
};

function clearAuthMessages() {
  ['authError','authSuccess'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.add('hidden'); el.textContent = '';
  });
}
function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.classList.remove('hidden');
}
function showAuthSuccess(msg) {
  const el = document.getElementById('authSuccess');
  el.textContent = msg; el.classList.remove('hidden');
}

// ──────────────────────────────────────────────
// REGISTER
// ──────────────────────────────────────────────
window.handleRegister = async (e) => {
  e.preventDefault(); clearAuthMessages();
  const btn = document.getElementById('registerBtn');
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, 'users', cred.user.uid), {
      name, email, bio: '', avatarUrl: '', createdAt: serverTimestamp()
    });
    showAuthSuccess('注册成功！欢迎加入神秘空间 ✨');
    setTimeout(() => showPage('home'), 1200);
  } catch (err) {
    showAuthError(friendlyError(err.code));
  } finally {
    btn.disabled = false; btn.textContent = '创建账号';
  }
};

// ──────────────────────────────────────────────
// LOGIN
// ──────────────────────────────────────────────
window.handleLogin = async (e) => {
  e.preventDefault(); clearAuthMessages();
  const btn = document.getElementById('loginBtn');
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    await signInWithEmailAndPassword(auth, email, password);
    showPage('home');
  } catch (err) {
    showAuthError(friendlyError(err.code));
  } finally {
    btn.disabled = false; btn.textContent = '登录';
  }
};

// ──────────────────────────────────────────────
// LOGOUT
// ──────────────────────────────────────────────
window.logout = async () => {
  await signOut(auth);
  showPage('home');
};

// ──────────────────────────────────────────────
// PROFILE
// ──────────────────────────────────────────────
async function loadUserProfile(uid) {
  const snap = await getDoc(doc(db, 'users', uid));
  if (!snap.exists()) return;
  const data = snap.data();
  document.getElementById('profileName').textContent = data.name || '无名氏';
  document.getElementById('profileBio').textContent = data.bio || '还没有简介';
  if (data.avatarUrl) {
    document.getElementById('profileAvatar').src = data.avatarUrl;
  } else {
    const name = encodeURIComponent(data.name || 'U');
    document.getElementById('profileAvatar').src =
      `https://ui-avatars.com/api/?name=${name}&background=e94560&color=fff`;
  }
  document.getElementById('editName').value = data.name || '';
  document.getElementById('editBio').value = data.bio || '';
}

window.showEditProfile = () => document.getElementById('editProfileCard').classList.remove('hidden');
window.hideEditProfile = () => document.getElementById('editProfileCard').classList.add('hidden');

window.saveProfile = async () => {
  if (!currentUser) return;
  const name = document.getElementById('editName').value.trim();
  const bio = document.getElementById('editBio').value.trim();
  const errEl = document.getElementById('profileError');
  errEl.classList.add('hidden');
  try {
    await setDoc(doc(db, 'users', currentUser.uid), { name, bio }, { merge: true });
    await updateProfile(currentUser, { displayName: name });
    await loadUserProfile(currentUser.uid);
    hideEditProfile();
  } catch (err) {
    errEl.textContent = '保存失败: ' + err.message;
    errEl.classList.remove('hidden');
  }
};



// ──────────────────────────────────────────────
// PRESET MYSTERIES（始终保留在随机池）
// ──────────────────────────────────────────────

// ──────────────────────────────────────────────
// MYSTERIES — GLOBAL POOL (real-time)
// ──────────────────────────────────────────────
function loadMysteries() {
  if (unsubscribeMysteries) unsubscribeMysteries();
  const q = query(collection(db, 'mysteries'), orderBy('createdAt', 'desc'));
  unsubscribeMysteries = onSnapshot(q, (snap) => {
    const userMysteries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    allMysteries = [...PRESET_MYSTERIES, ...userMysteries];
    if (currentMysteryIndex === -1) showRandomMystery();
  });
}

let mysteryOpen = false;

function showRandomMystery() {
  if (allMysteries.length === 0) return;
  let idx;
  do { idx = Math.floor(Math.random() * allMysteries.length); }
  while (allMysteries.length > 1 && idx === currentMysteryIndex);
  currentMysteryIndex = idx;
  document.getElementById('mysteryDisplay').textContent = allMysteries[idx].text;
}

window.toggleMystery = function() {
  const el = document.getElementById('mysteryDisplay');
  const btn = document.getElementById('mysteryToggle');
  if (mysteryOpen) {
    el.classList.remove('open');
    btn.textContent = '打开';
    mysteryOpen = false;
  } else {
    showRandomMystery();
    el.classList.add('open');
    btn.textContent = '关闭';
    mysteryOpen = true;
  }
};

// ──────────────────────────────────────────────
// MYSTERIES — ADD
// ──────────────────────────────────────────────
window.addMystery = async () => {
  if (!currentUser) { alert('请先登录'); showPage('auth'); return; }
  const text = document.getElementById('newMystery').value.trim();
  if (!text) { alert('请填写文案内容'); return; }
  try {
    await addDoc(collection(db, 'mysteries'), {
      uid: currentUser.uid,
      text,
      createdAt: serverTimestamp()
    });
    document.getElementById('newMystery').value = '';
    await loadMyMysteries(currentUser.uid);
  } catch (err) {
    alert('添加失败: ' + err.message);
  }
};

// ──────────────────────────────────────────────
// MYSTERIES — MY LIST (profile)
// ──────────────────────────────────────────────
async function loadMyMysteries(uid) {
  const container = document.getElementById('mysteryList');
  // 只用 where，不加 orderBy，避免复合索引要求；客户端按时间排序
  const q = query(collection(db, 'mysteries'), where('uid','==',uid));
  try {
    const snap = await getDocs(q);
    if (snap.empty) {
      container.innerHTML = '<div class="text-sm text-center" style="padding:12px 0;">暂无文案，快来添加吧</div>';
      return;
    }
    const docs = snap.docs.sort((a, b) => {
      const ta = a.data().createdAt?.toMillis?.() ?? 0;
      const tb = b.data().createdAt?.toMillis?.() ?? 0;
      return tb - ta;
    });
    container.innerHTML = docs.map(d => {
      const data = d.data();
      return `
        <div class="mystery-item" id="mystery-${d.id}">
          <div class="mystery-item-text">${esc(data.text)}</div>
          <div class="mystery-actions">
            <button class="btn btn-secondary btn-sm" onclick="editMystery('${d.id}', this)">编辑</button>
            <button class="btn btn-secondary btn-sm" style="color:var(--accent)" onclick="deleteMystery('${d.id}')">删除</button>
          </div>
        </div>`;
    }).join('');

  } catch (err) {
    container.innerHTML = '<div class="text-sm text-center">加载失败</div>';
  }
}

window.editMystery = (id, btn) => {
  const item = document.getElementById(`mystery-${id}`);
  const textEl = item.querySelector('.mystery-item-text');
  const current = textEl.textContent;
  textEl.innerHTML = `<textarea style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-family:inherit;font-size:14px;resize:vertical;">${current}</textarea>`;
  btn.textContent = '保存';
  btn.onclick = () => saveMystery(id, item);
};

async function saveMystery(id, item) {
  const textarea = item.querySelector('textarea');
  const newText = textarea.value.trim();
  if (!newText) { alert('文案不能为空'); return; }
  try {
    await setDoc(doc(db, 'mysteries', id), { text: newText }, { merge: true });
    await loadMyMysteries(currentUser.uid);
  } catch (err) {
    alert('保存失败: ' + err.message);
  }
}

window.deleteMystery = async (id) => {
  if (!confirm('确定删除这条神秘文案？')) return;
  try {
    await deleteDoc(doc(db, 'mysteries', id));
    await loadMyMysteries(currentUser.uid);
  } catch (err) {
    alert('删除失败: ' + err.message);
  }
};

// ──────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────
function esc(str = '') {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(date) {
  const diff = (Date.now() - date.getTime()) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return `${Math.floor(diff/60)} 分钟前`;
  if (diff < 86400) return `${Math.floor(diff/3600)} 小时前`;
  if (diff < 604800) return `${Math.floor(diff/86400)} 天前`;
  return date.toLocaleDateString('zh-CN');
}

function friendlyError(code) {
  const map = {
    'auth/email-already-in-use': '该邮箱已被注册',
    'auth/invalid-email': '邮箱格式不正确',
    'auth/weak-password': '密码至少需要6位',
    'auth/user-not-found': '账号不存在',
    'auth/wrong-password': '密码错误',
    'auth/invalid-credential': '邮箱或密码错误',
    'auth/too-many-requests': '操作太频繁，请稍后再试',
  };
  return map[code] || '操作失败，请重试';
}
