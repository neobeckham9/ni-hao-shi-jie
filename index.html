<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>神秘空间</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --text: #eaeaea;
      --text2: #aaa;
      --border: #2a2a4a;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      -webkit-text-size-adjust: 100%;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ─── NAV ─────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      padding-left: max(20px, env(safe-area-inset-left));
      padding-right: max(20px, env(safe-area-inset-right));
      padding-top: env(safe-area-inset-top);
      height: calc(56px + env(safe-area-inset-top));
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .nav-logo { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
    .nav-links { display: flex; gap: 12px; }
    .nav-btn {
      padding: 8px 16px;
      min-height: 36px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: all .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:hover, .nav-btn.active { background: var(--accent); border-color: var(--accent); }
    .nav-btn:active { opacity: 0.7; }
    .nav-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid var(--accent);
    }

    /* ─── PAGES ───────────────────────────── */
    .page {
      display: none; max-width: 680px; margin: 0 auto;
      padding: 24px 16px;
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
    }
    .page.active { display: block; }

    /* ─── CARD ────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    /* ─── AUTH PAGE ───────────────────────── */
    .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
    .auth-tab {
      flex: 1; padding: 12px; text-align: center; cursor: pointer;
      background: transparent; border: none; color: var(--text2); font-size: 15px; transition: all .2s;
    }
    .auth-tab.active { background: var(--accent); color: #fff; font-weight: 600; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text2); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 16px; /* 16px 防止 iOS 自动缩放 */
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    /* ─── BUTTONS ─────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 20px; border-radius: 10px; border: none; cursor: pointer;
      font-size: 15px; font-weight: 600; transition: all .2s; width: 100%;
      min-height: 44px; /* Apple HIG 最小触摸目标 */
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:active { opacity: .75; transform: scale(.98); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:active { opacity: .75; }
    .btn-sm { width: auto; padding: 8px 16px; font-size: 13px; min-height: 36px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ─── ERROR / SUCCESS ─────────────────── */
    .alert {
      padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
    }
    .alert-error { background: rgba(233,69,96,.15); border: 1px solid var(--accent); color: #ff6b87; }
    .alert-success { background: rgba(46,213,115,.15); border: 1px solid #2ed573; color: #2ed573; }

    /* ─── MYSTERIOUS COPY ─────────────────── */
    .mystery-banner {
      background: linear-gradient(135deg, var(--accent2), #1a1a4e);
      border: 1px solid #3a3a7a;
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .mystery-banner::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 70% 30%, rgba(233,69,96,.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .mystery-label { font-size: 11px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 16px; }
    .mystery-text {
      font-size: 20px; line-height: 1.6; color: var(--text); font-style: italic;
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height .5s ease, opacity .4s ease, margin .4s ease;
      margin-top: 0; white-space: pre-line;
    }
    .mystery-text.open { max-height: 300px; opacity: 1; margin-top: 16px; }
    .mystery-toggle {
      cursor: pointer; background: none; border: 1px solid var(--accent);
      color: var(--accent); border-radius: 20px; padding: 10px 28px;
      font-size: 14px; letter-spacing: 1px; transition: all .2s;
      min-height: 44px; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .mystery-toggle:hover { background: var(--accent); color: #fff; }
    .mystery-toggle:active { opacity: 0.7; transform: scale(.97); }

    /* ─── AUTHOR CARD ─────────────────────── */
    .author-reveal {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height .4s ease, opacity .3s ease, margin .3s ease;
      margin-top: 0;
    }
    .author-reveal.open { max-height: 200px; opacity: 1; margin-top: 20px; }
    .author-card {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px; padding: 14px 16px;
    }
    .author-avatar {
      width: 48px; height: 48px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--accent); flex-shrink: 0;
    }
    .author-info { flex: 1; text-align: left; }
    .author-name { font-weight: 700; font-size: 15px; }
    .author-bio { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .btn-follow {
      cursor: pointer; background: var(--accent); border: none;
      color: #fff; border-radius: 20px; padding: 8px 18px;
      font-size: 13px; font-weight: 600; font-family: inherit;
      min-height: 36px; flex-shrink: 0; transition: opacity .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-follow:active { opacity: .7; }
    .btn-follow.followed { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

    /* ─── POST CARD ───────────────────────── */
    .post-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
    .post-header { display: flex; align-items: center; gap: 12px; padding: 16px; }
    .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
    .post-author { font-weight: 600; font-size: 14px; }
    .post-time { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .post-content { padding: 0 16px 16px; font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }
    .post-image { width: 100%; max-height: 400px; object-fit: cover; display: block; }

    /* ─── UPLOAD AREA ─────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s;
      background: var(--surface2);
    }
    .upload-zone:hover { border-color: var(--accent); }
    .upload-zone input[type=file] { display: none; }
    .upload-zone .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .upload-zone .upload-hint { font-size: 13px; color: var(--text2); }
    .upload-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-top: 12px; display: none; }

    /* ─── PROFILE ─────────────────────────── */
    .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .profile-avatar-wrap { position: relative; cursor: pointer; }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--accent);
    }
    .avatar-overlay {
      position: absolute; inset: 0; border-radius: 50%; background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; opacity: 0; transition: opacity .2s;
    }
    .profile-avatar-wrap:hover .avatar-overlay { opacity: 1; }
    .profile-name { font-size: 22px; font-weight: 700; }
    .profile-bio { font-size: 14px; color: var(--text2); margin-top: 4px; }

    /* ─── MYSTERY LIST ────────────────────── */
    .mystery-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .mystery-item:last-child { border-bottom: none; }
    .mystery-item-text { flex: 1; font-size: 14px; line-height: 1.6; color: var(--text); }
    .mystery-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ─── LOADER ──────────────────────────── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── NOTIFICATION BELL ──────────────────── */
    .nav-bell-wrap { display: none; }
    .nav-bell-wrap.show { display: inline-flex !important; }

    /* ─── CHAT MESSAGES ──────────────────────── */
    .chat-bubble {
      max-width: 72%; padding: 10px 14px; border-radius: 18px;
      font-size: 14px; line-height: 1.5; word-break: break-word;
    }
    .chat-bubble-mine {
      background: var(--accent); color: #fff;
      border-bottom-right-radius: 4px; align-self: flex-end;
    }
    .chat-bubble-other {
      background: var(--surface2); color: var(--text);
      border-bottom-left-radius: 4px; align-self: flex-start;
    }
    .chat-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .chat-row { display: flex; flex-direction: column; }
    .chat-row-mine { align-items: flex-end; }
    .chat-row-other { align-items: flex-start; }

    /* ─── FRIENDS LIST ────────────────────────── */
    .friend-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .friend-item:last-child { border-bottom: none; }
    .friend-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--border); flex-shrink: 0;
    }
    .friend-info { flex: 1; }
    .friend-name { font-weight: 600; font-size: 14px; }
    .friend-bio { font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* ─── NOTIF ITEM ──────────────────────────── */
    .notif-item {
      padding: 10px 16px; font-size: 13px; border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-item.unread { background: rgba(233,69,96,.08); }

    .hidden { display: none !important; }
    .text-center { text-align: center; }
    .text-sm { font-size: 13px; color: var(--text2); }
    .mt-12 { margin-top: 12px; }
    .mb-0 { margin-bottom: 0; }

    /* ─── RESPONSIVE / iPhone ────────────── */
    @media (max-width: 480px) {
      .profile-header { flex-direction: column; text-align: center; }
      .mystery-text { font-size: 17px; }
      .card { padding: 18px; border-radius: 14px; }
      .post-card { border-radius: 14px; }
      .nav-logo { font-size: 18px; }
      .profile-name { font-size: 20px; }
    }
    /* 支持圆角屏幕（iPhone X+）横屏 */
    @media (max-width: 900px) and (orientation: landscape) {
      .page {
        padding-left: max(16px, env(safe-area-inset-left));
        padding-right: max(16px, env(safe-area-inset-right));
      }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════ NAV -->
<nav>
  <span class="nav-logo">✦ 神秘空间</span>
  <div class="nav-links" id="navLinks">
    <button class="nav-btn" onclick="showPage('home')">首页</button>
    <button class="nav-btn hidden" id="navProfile" onclick="showPage('profile')">我的</button>
    <div class="nav-bell-wrap hidden" id="navBellWrap" style="position:relative;display:inline-flex;align-items:center;">
      <button class="nav-btn" id="navBell" onclick="toggleNotifDropdown()" style="padding:8px 12px;font-size:18px;line-height:1;">🔔</button>
      <span id="notifBadge" class="hidden" style="position:absolute;top:2px;right:2px;background:var(--accent);color:#fff;border-radius:50%;font-size:11px;font-weight:700;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:0 3px;"></span>
      <div id="notifDropdown" class="hidden" style="position:absolute;top:calc(100% + 8px);right:0;width:280px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:999;max-height:360px;overflow-y:auto;">
        <div style="padding:12px 16px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);">通知</div>
        <div id="notifList" style="padding:8px 0;"></div>
      </div>
    </div>
    <button class="nav-btn hidden" id="navLogout" onclick="logout()">退出</button>
    <button class="nav-btn" id="navLogin" onclick="showPage('auth')">登录</button>
  </div>
</nav>

<!-- ═══════════════════════════════════════════ AUTH PAGE -->
<div class="page" id="pageAuth">
  <div class="card" style="max-width:400px;margin:0 auto;">
    <h2 style="text-align:center;margin-bottom:20px;">欢迎回来</h2>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">登录</button>
      <button class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">注册</button>
    </div>
    <div id="authError" class="alert alert-error hidden"></div>
    <div id="authSuccess" class="alert alert-success hidden"></div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button class="btn btn-primary" type="submit" id="loginBtn">登录</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>昵称</label>
        <input type="text" id="regName" placeholder="起个有趣的名字" required>
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="regEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>密码（至少6位）</label>
        <input type="password" id="regPassword" placeholder="••••••••" required minlength="6">
      </div>
      <button class="btn btn-primary" type="submit" id="registerBtn">创建账号</button>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════════ HOME PAGE -->
<div class="page active" id="pageHome">
  <!-- Mystery banner -->
  <div class="mystery-banner">
    <div class="mystery-label">我知道你的秘密</div>
    <div class="mystery-text" id="mysteryDisplay"></div>
    <button class="mystery-toggle" id="mysteryToggle" onclick="toggleMystery()">打开</button>
    <button class="mystery-toggle" id="authorToggle" onclick="toggleAuthor()" style="margin-top:10px;display:none;">查看是谁写的</button>
    <div class="author-reveal" id="authorReveal">
      <div class="author-card" id="authorCard">
        <img class="author-avatar" id="authorAvatar" src="" alt="头像">
        <div class="author-info">
          <div class="author-name" id="authorName"></div>
          <div class="author-bio" id="authorBioText"></div>
        </div>
        <button class="btn-follow" id="followBtn" onclick="toggleFollow()"></button>
      </div>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════════ PROFILE PAGE -->
<div class="page" id="pageProfile">
  <div class="card">
    <div class="profile-header">
      <div class="profile-avatar-wrap">
        <img id="profileAvatar" class="profile-avatar" src="https://ui-avatars.com/api/?name=U&background=e94560&color=fff" alt="头像">
      </div>
      <div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-bio" id="profileBio">还没有简介</div>
      </div>
    </div>
    <button class="btn btn-secondary" onclick="showEditProfile()">✏️ 编辑资料</button>
  </div>

  <!-- Edit profile form -->
  <div class="card hidden" id="editProfileCard">
    <h3 style="margin-bottom:16px;">编辑资料</h3>
    <div id="profileError" class="alert alert-error hidden"></div>
    <div class="form-group">
      <label>昵称</label>
      <input type="text" id="editName" placeholder="你的名字">
    </div>
    <div class="form-group">
      <label>个人简介</label>
      <textarea id="editBio" placeholder="介绍一下自己..."></textarea>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" onclick="saveProfile()">保存</button>
      <button class="btn btn-secondary" onclick="hideEditProfile()">取消</button>
    </div>
  </div>

  <!-- Mystery copy manager -->
  <div class="card">
    <h3 style="margin-bottom:4px;">🔮 我的神秘文案库</h3>
    <p class="text-sm" style="margin-bottom:16px;">这些文案会随机出现在首页 · 你越写越多，随机池越神秘</p>

    <div class="form-group">
      <textarea id="newMystery" placeholder="写下你的神秘文案..." rows="2"></textarea>
    </div>
    <button class="btn btn-primary" onclick="addMystery()">+ 加入文案库</button>

    <div id="mysteryList" style="margin-top:20px;">
      <div class="text-sm text-center" style="padding:12px 0;">暂无文案，快来添加吧</div>
    </div>
  </div>

  <!-- Friends list -->
  <div class="card" id="friendsCard">
    <h3 style="margin-bottom:16px;">👥 我的好友</h3>
    <div style="display:flex;gap:0;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:16px;">
      <button class="auth-tab active" id="friendsTab0" onclick="switchFriendsTab(0)">我关注的</button>
      <button class="auth-tab" id="friendsTab1" onclick="switchFriendsTab(1)">关注我的</button>
      <button class="auth-tab" id="friendsTab2" onclick="switchFriendsTab(2)">好友（互关）</button>
    </div>
    <div id="friendsList" style="min-height:60px;"></div>
  </div>

</div>

<!-- ═══════════════════════════════════════════ CHAT PAGE -->
<div class="page" id="pageChat">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
    <button class="btn btn-secondary btn-sm" style="width:auto;" onclick="showPage('profile')">← 返回</button>
    <h3 id="chatTitle" style="flex:1;font-size:16px;"></h3>
  </div>
  <div id="chatMessages" style="min-height:300px;max-height:55vh;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 0;margin-bottom:16px;"></div>
  <div style="display:flex;gap:10px;">
    <input type="text" id="chatInput" placeholder="说点什么..." style="flex:1;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;" onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="btn btn-primary btn-sm" style="width:auto;min-height:44px;padding:0 20px;" onclick="sendMessage()">发送</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ FIREBASE + APP JS -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged, updateProfile
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, collection, doc, setDoc, getDoc, addDoc, getDocs,
  query, orderBy, where, deleteDoc, serverTimestamp, onSnapshot,
  writeBatch, limit

async function loadUserProfile(uid) {
  const snap = await getDoc(doc(db, 'users', uid));
  if (!snap.exists()) return;
  const data = snap.data();
  document.getElementById('profileName').textContent = data.name || '无名氏';
  document.getElementById('profileBio').textContent = data.bio || '还没有简介';
  if (data.avatarUrl) {
    document.getElementById('profileAvatar').src = data.avatarUrl;
  } else {
    const name = encodeURIComponent(data.name || 'U');
    document.getElementById('profileAvatar').src =
      `https://ui-avatars.com/api/?name=${name}&background=e94560&color=fff`;
  }
  document.getElementById('editName').value = data.name || '';
  document.getElementById('editBio').value = data.bio || '';
}

// MYSTERIES — GLOBAL POOL (real-time)
// ──────────────────────────────────────────────
function loadMysteries() {
  if (unsubscribeMysteries) unsubscribeMysteries();
  const q = query(collection(db, 'mysteries'), orderBy('createdAt', 'desc'));
  unsubscribeMysteries = onSnapshot(q, (snap) => {
    const userMysteries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    allMysteries = [...PRESET_MYSTERIES, ...userMysteries];
    if (currentMysteryIndex === -1) showRandomMystery();
  }, (err) => {
    console.warn('mysteries read failed, using presets:', err.message);
    allMysteries = [...PRESET_MYSTERIES];
    if (currentMysteryIndex === -1) showRandomMystery();
  });
}

let mysteryOpen = false;

function showRandomMystery() {
  if (allMysteries.length === 0) return;
  let idx;
  do { idx = Math.floor(Math.random() * allMysteries.length); }
  while (allMysteries.length > 1 && idx === currentMysteryIndex);
  currentMysteryIndex = idx;
  const m = allMysteries[idx];
  document.getElementById('mysteryDisplay').textContent = m.text;
  currentMysteryUid = m.uid || null;

  // 重置作者区
  authorRevealed = false;
  document.getElementById('authorReveal').classList.remove('open');
  const authorBtn = document.getElementById('authorToggle');
  authorBtn.style.display = currentMysteryUid ? 'inline-block' : 'none';
  authorBtn.textContent = '查看是谁写的';
}

window.toggleMystery = function() {
  const el = document.getElementById('mysteryDisplay');
  const btn = document.getElementById('mysteryToggle');
  if (mysteryOpen) {
    el.classList.remove('open');
    btn.textContent = '打开';
    mysteryOpen = false;
    document.getElementById('authorToggle').style.display = 'none';
    document.getElementById('authorReveal').classList.remove('open');
    authorRevealed = false;
  } else {
    showRandomMystery();
    el.classList.add('open');
    btn.textContent = '关闭';
    mysteryOpen = true;
  }
};

window.toggleFollow = async function() {
  if (!currentUser) { showPage('auth'); return; }
  if (!currentMysteryUid || currentMysteryUid === currentUser.uid) return;
  const followId = `${currentUser.uid}_${currentMysteryUid}`;
  const followRef = doc(db, 'follows', followId);
  const btn = document.getElementById('followBtn');
  btn.disabled = true;
  try {
    const snap = await getDoc(followRef);
    if (snap.exists()) {
      await deleteDoc(followRef);
      btn.textContent = '+ 加为好友';
      btn.className = 'btn-follow';
    } else {
      await setDoc(followRef, {
        from: currentUser.uid,
        to: currentMysteryUid,
        createdAt: serverTimestamp()
      });
      btn.textContent = '已关注 ✓';
      btn.className = 'btn-follow followed';
      // Write follow notification to target user
      try {
        await addDoc(collection(db, 'notifications', currentMysteryUid, 'items'), {
          from: currentUser.uid,
          fromName: currentUser.displayName || '神秘用户',
          type: 'follow',
          createdAt: serverTimestamp(),
          read: false
        });
      } catch (_) { /* notification failure is non-fatal */ }
    }
  } catch (err) {
    alert('操作失败: ' + err.message);
  } finally {
    btn.disabled = false;
  }
};

// MYSTERIES — MY LIST (profile)
// ──────────────────────────────────────────────
async function loadMyMysteries(uid) {
  const container = document.getElementById('mysteryList');
  // 只用 where，不加 orderBy，避免复合索引要求；客户端按时间排序
  const q = query(collection(db, 'mysteries'), where('uid','==',uid));
  try {
    const snap = await getDocs(q);
    if (snap.empty) {
      container.innerHTML = '<div class="text-sm text-center" style="padding:12px 0;">暂无文案，快来添加吧</div>';
      return;
    }
    const docs = snap.docs.sort((a, b) => {
      const ta = a.data().createdAt?.toMillis?.() ?? 0;
      const tb = b.data().createdAt?.toMillis?.() ?? 0;
      return tb - ta;
    });
    container.innerHTML = docs.map(d => {
      const data = d.data();
      return `
        <div class="mystery-item" id="mystery-${d.id}">
          <div class="mystery-item-text">${esc(data.text)}</div>
          <div class="mystery-actions">
            <button class="btn btn-secondary btn-sm" onclick="editMystery('${d.id}', this)">编辑</button>
            <button class="btn btn-secondary btn-sm" style="color:var(--accent)" onclick="deleteMystery('${d.id}')">删除</button>
          </div>
        </div>`;
    }).join('');

  } catch (err) {
    container.innerHTML = '<div class="text-sm text-center">加载失败</div>';
  }
}

window.editMystery = (id, btn) => {
  const item = document.getElementById(`mystery-${id}`);
  const textEl = item.querySelector('.mystery-item-text');
  const current = textEl.textContent;
  textEl.innerHTML = `<textarea style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-family:inherit;font-size:14px;resize:vertical;">${current}</textarea>`;
  btn.textContent = '保存';
  btn.onclick = () => saveMystery(id, item);
};

async function saveMystery(id, item) {
  const textarea = item.querySelector('textarea');
  const newText = textarea.value.trim();
  if (!newText) { alert('文案不能为空'); return; }
  try {
    await setDoc(doc(db, 'mysteries', id), { text: newText }, { merge: true });
    await loadMyMysteries(currentUser.uid);
  } catch (err) {
    alert('保存失败: ' + err.message);
  }
}

window.deleteMystery = async (id) => {
  if (!confirm('确定删除这条神秘文案？')) return;
  try {
    await deleteDoc(doc(db, 'mysteries', id));
    await loadMyMysteries(currentUser.uid);
  } catch (err) {
    alert('删除失败: ' + err.message);
  }
};

function setupNotifListener(uid) {
  if (unsubscribeNotifs) unsubscribeNotifs();
  const q = query(
    collection(db, 'notifications', uid, 'items'),
    where('read', '==', false)
  );
  unsubscribeNotifs = onSnapshot(q, (snap) => {
    const count = snap.size;
    const badge = document.getElementById('notifBadge');
    if (count > 0) {
      badge.textContent = count > 99 ? '99+' : String(count);
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  }, (err) => {
    console.warn('通知监听失败:', err.message);
  });
}

    snap = await getDocs(q);
  } catch (err) {
    listEl.innerHTML = '<div class="notif-item" style="color:var(--text2);">加载失败</div>';
    console.warn('通知加载失败:', err.message);
    dropdown.classList.remove('hidden');
    return;
  }
  // Render notifications first
  if (snap.empty) {
    listEl.innerHTML = '<div class="notif-item" style="color:var(--text2);">暂无通知</div>';
  } else {
    const unreadIds = new Set(snap.docs.filter(d => !d.data().read).map(d => d.id));
    listEl.innerHTML = snap.docs.map(d => {
      const data = d.data();
      const isUnread = unreadIds.has(d.id);
      const typeText = data.type === 'follow' ? '关注了你' : data.type;
      const timeStr = data.createdAt?.toDate ? timeAgo(data.createdAt.toDate()) : '';
      return `<div class="notif-item${isUnread ? ' unread' : ''}">
        <strong>${esc(data.fromName || '神秘用户')}</strong> ${typeText}
        <span style="color:var(--text2);font-size:11px;margin-left:6px;">${timeStr}</span>
      </div>`;
    }).join('');
    // Clear badge immediately when user opens the dropdown
    const badge = document.getElementById('notifBadge');
    badge.classList.add('hidden');
    // Mark as read in background (non-fatal)
    try {
      const unreadDocs = snap.docs.filter(d => !d.data().read);
      if (unreadDocs.length > 0) {
        const batch = writeBatch(db);
        unreadDocs.forEach(d => batch.update(d.ref, { read: true }));
        await batch.commit();
      }
    } catch (_) { /* 标记已读失败不影响显示 */ }
  }
  dropdown.classList.remove('hidden');
};

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('navBellWrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('notifDropdown')?.classList.add('hidden');
  }
});

// ──────────────────────────────────────────────
// FEATURE 2: FRIENDS LIST
// ──────────────────────────────────────────────
window.switchFriendsTab = (tab) => {
  currentFriendsTab = tab;
  [0, 1, 2].forEach(i => {
    document.getElementById(`friendsTab${i}`)?.classList.toggle('active', i === tab);
  });
  renderFriendsTab();
};

let _friendsData = { following: [], followers: [], profiles: {} };

async function loadFriends() {
  if (!currentUser) return;
  const listEl = document.getElementById('friendsList');
  listEl.innerHTML = '<div class="text-sm text-center" style="padding:12px 0;">加载中...</div>';
  try {
    const [followingSnap, followersSnap] = await Promise.all([
      getDocs(query(collection(db, 'follows'), where('from', '==', currentUser.uid))),
      getDocs(query(collection(db, 'follows'), where('to', '==', currentUser.uid)))
    ]);
    const following = followingSnap.docs.map(d => d.data().to);
    const followers = followersSnap.docs.map(d => d.data().from);
    _friendsData = { following, followers, profiles: {} };

    // Fetch all unique uids' profiles
    const allUids = [...new Set([...following, ...followers])];
    await Promise.all(allUids.map(async (uid) => {
      const snap = await getDoc(doc(db, 'users', uid));
      _friendsData.profiles[uid] = snap.exists() ? snap.data() : { name: '神秘用户', bio: '', avatarUrl: '' };
    }));
    renderFriendsTab();
  } catch (err) {
    listEl.innerHTML = '<div class="text-sm text-center">加载失败</div>';
  }
}

function renderFriendsTab() {
  const listEl = document.getElementById('friendsList');
  const { following, followers, profiles } = _friendsData;
  const followingSet = new Set(following);
  let uids = [];
  let showDM = false;
  let showFollowBack = false;
  if (currentFriendsTab === 0) { uids = following; }
  else if (currentFriendsTab === 1) { uids = followers; showFollowBack = true; }
  else {
    // Mutual follows
    uids = followers.filter(uid => followingSet.has(uid));
    showDM = true;
  }
  if (uids.length === 0) {
    listEl.innerHTML = '<div class="text-sm text-center" style="padding:12px 0;">暂无用户</div>';
    return;
  }
  listEl.innerHTML = uids.map(uid => {
    const p = profiles[uid] || {};
    const name = p.name || '神秘用户';
    const bio = p.bio || '暂无简介';
    const avatar = p.avatarUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=e94560&color=fff`;
    let actionBtn = '';
    if (showDM) {
      actionBtn = `<button class="btn btn-primary btn-sm" style="width:auto;flex-shrink:0;" onclick="openChat('${uid}')">发私信</button>`;
    } else if (showFollowBack) {
      if (followingSet.has(uid)) {
        actionBtn = `<button class="btn btn-sm" style="width:auto;flex-shrink:0;background:#2a2a3a;color:#aaa;border:1px solid #444;border-radius:8px;padding:6px 12px;cursor:default;" disabled>已互关 ✓</button>`;
      } else {
        actionBtn = `<button id="followback-${uid}" class="btn btn-primary btn-sm" style="width:auto;flex-shrink:0;" onclick="followBack('${uid}')">回关</button>`;
      }
    }
    return `<div class="friend-item">
      <img class="friend-avatar" src="${esc(avatar)}" alt="头像" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=e94560&color=fff'">
      <div class="friend-info">
        <div class="friend-name">${esc(name)}</div>
        <div class="friend-bio">${esc(bio)}</div>
      </div>
      ${actionBtn}
    </div>`;
  }).join('');
}

window.followBack = async function(targetUid) {
  if (!currentUser) return;
  const btn = document.getElementById(`followback-${targetUid}`);
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  const followId = `${currentUser.uid}_${targetUid}`;
  try {
    await setDoc(doc(db, 'follows', followId), {
      from: currentUser.uid,
      to: targetUid,
      createdAt: serverTimestamp()
    });
    try {
      await addDoc(collection(db, 'notifications', targetUid, 'items'), {
        from: currentUser.uid,
        fromName: currentUser.displayName || '神秘用户',
        type: 'follow',
        createdAt: serverTimestamp(),
        read: false
      });
    } catch (_) {}
    // Update local data and re-render
    _friendsData.following.push(targetUid);
    renderFriendsTab();
  } catch (err) {
    alert('回关失败: ' + err.message);
    if (btn) { btn.disabled = false; btn.textContent = '回关'; }
  }
};

// ──────────────────────────────────────────────
// FEATURE 3: DM CHAT
// ──────────────────────────────────────────────
window.openChat = async function(otherUid) {
  if (!currentUser) { showPage('auth'); return; }
  currentChatId = [currentUser.uid, otherUid].sort().join('_');
  // Set title from profile
  const profile = _friendsData.profiles[otherUid];
  const otherName = profile?.name || '对方';
  document.getElementById('chatTitle').textContent = `与 ${otherName} 的私信`;
  document.getElementById('chatInput').value = '';
  document.getElementById('chatMessages').innerHTML = '';
  showPage('chat');

  // Unsubscribe old listener
  if (unsubscribeChat) { unsubscribeChat(); unsubscribeChat = null; }

  const q = query(
    collection(db, 'messages', currentChatId, 'msgs'),
    orderBy('createdAt', 'asc')
  );
  unsubscribeChat = onSnapshot(q, (snap) => {
    const container = document.getElementById('chatMessages');
    container.innerHTML = snap.docs.map(d => {
      const data = d.data();
      const isMine = data.from === currentUser.uid;
      const timeStr = data.createdAt?.toDate ? timeAgo(data.createdAt.toDate()) : '';
      return `<div class="chat-row ${isMine ? 'chat-row-mine' : 'chat-row-other'}">
        <div class="chat-bubble ${isMine ? 'chat-bubble-mine' : 'chat-bubble-other'}">${esc(data.text)}</div>
        <div class="chat-meta">${timeStr}</div>
      </div>`;
    }).join('');
    // Scroll to bottom
    container.scrollTop = container.scrollHeight;
  });
};

window.sendMessage = async function() {
  if (!currentUser || !currentChatId) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  try {
    await addDoc(collection(db, 'messages', currentChatId, 'msgs'), {
      from: currentUser.uid,
      text,
      createdAt: serverTimestamp()
    });
  } catch (err) {
    alert('发送失败: ' + err.message);
    input.value = text;
  }
};

// ──────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────
function esc(str = '') {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(date) {
  const diff = (Date.now() - date.getTime()) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return `${Math.floor(diff/60)} 分钟前`;
  if (diff < 86400) return `${Math.floor(diff/3600)} 小时前`;
  if (diff < 604800) return `${Math.floor(diff/86400)} 天前`;
  return date.toLocaleDateString('zh-CN');
}

function friendlyError(code) {
  const map = {
    'auth/email-already-in-use': '该邮箱已被注册',
    'auth/invalid-email': '邮箱格式不正确',
    'auth/weak-password': '密码至少需要6位',
    'auth/user-not-found': '账号不存在',
    'auth/wrong-password': '密码错误',
    'auth/invalid-credential': '邮箱或密码错误',
    'auth/too-many-requests': '操作太频繁，请稍后再试',
  };
  return map[code] || '操作失败，请重试';
}
