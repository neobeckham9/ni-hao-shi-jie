<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神秘空间</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --text: #eaeaea;
      --text2: #aaa;
      --border: #2a2a4a;
      --radius: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── NAV ─────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
    .nav-links { display: flex; gap: 12px; }
    .nav-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      transition: all .2s;
    }
    .nav-btn:hover, .nav-btn.active { background: var(--accent); border-color: var(--accent); }
    .nav-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid var(--accent);
    }

    /* ─── PAGES ───────────────────────────── */
    .page { display: none; max-width: 680px; margin: 0 auto; padding: 32px 16px; }
    .page.active { display: block; }

    /* ─── CARD ────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    /* ─── AUTH PAGE ───────────────────────── */
    .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
    .auth-tab {
      flex: 1; padding: 12px; text-align: center; cursor: pointer;
      background: transparent; border: none; color: var(--text2); font-size: 15px; transition: all .2s;
    }
    .auth-tab.active { background: var(--accent); color: #fff; font-weight: 600; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text2); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    /* ─── BUTTONS ─────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 600; transition: all .2s; width: 100%;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-sm { width: auto; padding: 6px 14px; font-size: 13px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ─── ERROR / SUCCESS ─────────────────── */
    .alert {
      padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
    }
    .alert-error { background: rgba(233,69,96,.15); border: 1px solid var(--accent); color: #ff6b87; }
    .alert-success { background: rgba(46,213,115,.15); border: 1px solid #2ed573; color: #2ed573; }

    /* ─── MYSTERIOUS COPY ─────────────────── */
    .mystery-banner {
      background: linear-gradient(135deg, var(--accent2), #1a1a4e);
      border: 1px solid #3a3a7a;
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .mystery-banner::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 70% 30%, rgba(233,69,96,.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .mystery-label { font-size: 11px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 16px; }
    .mystery-text { font-size: 20px; line-height: 1.6; color: var(--text); font-style: italic; min-height: 60px; }
    .mystery-refresh { margin-top: 16px; }

    /* ─── POST CARD ───────────────────────── */
    .post-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
    .post-header { display: flex; align-items: center; gap: 12px; padding: 16px; }
    .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
    .post-author { font-weight: 600; font-size: 14px; }
    .post-time { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .post-content { padding: 0 16px 16px; font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }
    .post-image { width: 100%; max-height: 400px; object-fit: cover; display: block; }

    /* ─── UPLOAD AREA ─────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s;
      background: var(--surface2);
    }
    .upload-zone:hover { border-color: var(--accent); }
    .upload-zone input[type=file] { display: none; }
    .upload-zone .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .upload-zone .upload-hint { font-size: 13px; color: var(--text2); }
    .upload-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-top: 12px; display: none; }

    /* ─── PROFILE ─────────────────────────── */
    .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .profile-avatar-wrap { position: relative; cursor: pointer; }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--accent);
    }
    .avatar-overlay {
      position: absolute; inset: 0; border-radius: 50%; background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; opacity: 0; transition: opacity .2s;
    }
    .profile-avatar-wrap:hover .avatar-overlay { opacity: 1; }
    .profile-name { font-size: 22px; font-weight: 700; }
    .profile-bio { font-size: 14px; color: var(--text2); margin-top: 4px; }

    /* ─── MYSTERY LIST ────────────────────── */
    .mystery-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .mystery-item:last-child { border-bottom: none; }
    .mystery-item-text { flex: 1; font-size: 14px; line-height: 1.6; color: var(--text); }
    .mystery-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ─── LOADER ──────────────────────────── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
    .text-center { text-align: center; }
    .text-sm { font-size: 13px; color: var(--text2); }
    .mt-12 { margin-top: 12px; }
    .mb-0 { margin-bottom: 0; }

    /* ─── RESPONSIVE ──────────────────────── */
    @media (max-width: 480px) {
      .profile-header { flex-direction: column; text-align: center; }
      .mystery-text { font-size: 16px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════ NAV -->
<nav>
  <span class="nav-logo">✦ 神秘空间</span>
  <div class="nav-links" id="navLinks">
    <button class="nav-btn" onclick="showPage('home')">首页</button>
    <button class="nav-btn hidden" id="navProfile" onclick="showPage('profile')">我的</button>
    <button class="nav-btn hidden" id="navLogout" onclick="logout()">退出</button>
    <button class="nav-btn" id="navLogin" onclick="showPage('auth')">登录</button>
  </div>
</nav>

<!-- ═══════════════════════════════════════════ AUTH PAGE -->
<div class="page" id="pageAuth">
  <div class="card" style="max-width:400px;margin:0 auto;">
    <h2 style="text-align:center;margin-bottom:20px;">欢迎回来</h2>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">登录</button>
      <button class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">注册</button>
    </div>
    <div id="authError" class="alert alert-error hidden"></div>
    <div id="authSuccess" class="alert alert-success hidden"></div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button class="btn btn-primary" type="submit" id="loginBtn">登录</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>昵称</label>
        <input type="text" id="regName" placeholder="起个有趣的名字" required>
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="regEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>密码（至少6位）</label>
        <input type="password" id="regPassword" placeholder="••••••••" required minlength="6">
      </div>
      <button class="btn btn-primary" type="submit" id="registerBtn">创建账号</button>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════════ HOME PAGE -->
<div class="page active" id="pageHome">
  <!-- Mystery banner -->
  <div class="mystery-banner">
    <div class="mystery-label">✦ 今日神秘文案 ✦</div>
    <div class="mystery-text" id="mysteryDisplay">正在召唤神秘...</div>
    <button class="btn btn-secondary btn-sm mystery-refresh" onclick="refreshMystery()">🎲 换一条</button>
  </div>

  <!-- Post composer (only when logged in) -->
  <div class="card hidden" id="composerCard">
    <h3 style="margin-bottom:16px;">✍️ 分享此刻</h3>
    <div class="form-group mb-0">
      <textarea id="postText" placeholder="说点什么..." rows="3"></textarea>
    </div>
    <div class="upload-zone mt-12" id="postUploadZone" onclick="document.getElementById('postImageInput').click()">
      <input type="file" id="postImageInput" accept="image/*" onchange="previewPostImage(event)">
      <div class="upload-icon">🖼️</div>
      <div class="upload-hint">点击添加图片（可选）</div>
      <img id="postImagePreview" class="upload-preview" alt="预览">
    </div>
    <button class="btn btn-primary mt-12" onclick="submitPost()">发布</button>
  </div>

  <!-- Feed -->
  <div id="feedContainer">
    <div class="text-center text-sm" style="padding:40px 0;">
      <div class="spinner"></div>
      <p style="margin-top:12px;">加载中...</p>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ PROFILE PAGE -->
<div class="page" id="pageProfile">
  <div class="card">
    <div class="profile-header">
      <div class="profile-avatar-wrap" onclick="document.getElementById('avatarInput').click()">
        <img id="profileAvatar" class="profile-avatar" src="https://ui-avatars.com/api/?name=U&background=e94560&color=fff" alt="头像">
        <div class="avatar-overlay">📷</div>
        <input type="file" id="avatarInput" accept="image/*" class="hidden" onchange="uploadAvatar(event)">
      </div>
      <div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-bio" id="profileBio">还没有简介</div>
      </div>
    </div>
    <button class="btn btn-secondary" onclick="showEditProfile()">✏️ 编辑资料</button>
  </div>

  <!-- Edit profile form -->
  <div class="card hidden" id="editProfileCard">
    <h3 style="margin-bottom:16px;">编辑资料</h3>
    <div id="profileError" class="alert alert-error hidden"></div>
    <div class="form-group">
      <label>昵称</label>
      <input type="text" id="editName" placeholder="你的名字">
    </div>
    <div class="form-group">
      <label>个人简介</label>
      <textarea id="editBio" placeholder="介绍一下自己..."></textarea>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" onclick="saveProfile()">保存</button>
      <button class="btn btn-secondary" onclick="hideEditProfile()">取消</button>
    </div>
  </div>

  <!-- Mystery copy manager -->
  <div class="card">
    <h3 style="margin-bottom:4px;">🔮 我的神秘文案库</h3>
    <p class="text-sm" style="margin-bottom:16px;">这些文案会随机出现在首页 · 你越写越多，随机池越神秘</p>

    <div class="form-group">
      <textarea id="newMystery" placeholder="写下你的神秘文案..." rows="2"></textarea>
    </div>
    <button class="btn btn-primary" onclick="addMystery()">+ 加入文案库</button>

    <div id="mysteryList" style="margin-top:20px;">
      <div class="text-sm text-center" style="padding:12px 0;">暂无文案，快来添加吧</div>
    </div>
  </div>

  <!-- My posts -->
  <div class="card">
    <h3 style="margin-bottom:16px;">📷 我的内容</h3>
    <div id="myPostsContainer">
      <div class="text-sm text-center" style="padding:12px 0;">还没有发布内容</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ FIREBASE + APP JS -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged, updateProfile
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, collection, doc, setDoc, getDoc, addDoc, getDocs,
  query, orderBy, where, deleteDoc, serverTimestamp, onSnapshot
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import {
  getStorage, ref, uploadBytes, getDownloadURL
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

// ──────────────────────────────────────────────
// 🔥 FIREBASE CONFIG — 替换为你的 Firebase 项目配置
// ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let currentUser = null;
let allMysteries = [];
let currentMysteryIndex = -1;

// ──────────────────────────────────────────────
// AUTH STATE
// ──────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (user) {
    document.getElementById('navProfile').classList.remove('hidden');
    document.getElementById('navLogout').classList.remove('hidden');
    document.getElementById('navLogin').classList.add('hidden');
    document.getElementById('composerCard').classList.remove('hidden');
    await loadUserProfile(user.uid);
  } else {
    document.getElementById('navProfile').classList.add('hidden');
    document.getElementById('navLogout').classList.add('hidden');
    document.getElementById('navLogin').classList.remove('hidden');
    document.getElementById('composerCard').classList.add('hidden');
  }
  loadFeed();
  loadMysteries();
});

// ──────────────────────────────────────────────
// PAGE NAVIGATION
// ──────────────────────────────────────────────
window.showPage = (name) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const map = { home: 'pageHome', auth: 'pageAuth', profile: 'pageProfile' };
  document.getElementById(map[name])?.classList.add('active');
  if (name === 'profile' && currentUser) {
    loadUserProfile(currentUser.uid);
    loadMyPosts(currentUser.uid);
    loadMyMysteries(currentUser.uid);
  }
};

// ──────────────────────────────────────────────
// AUTH TABS
// ──────────────────────────────────────────────
window.switchAuthTab = (tab) => {
  clearAuthMessages();
  if (tab === 'login') {
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabRegister').classList.remove('active');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('registerForm').classList.add('hidden');
  } else {
    document.getElementById('tabRegister').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('loginForm').classList.add('hidden');
  }
};

function clearAuthMessages() {
  ['authError','authSuccess'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.add('hidden'); el.textContent = '';
  });
}
function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.classList.remove('hidden');
}
function showAuthSuccess(msg) {
  const el = document.getElementById('authSuccess');
  el.textContent = msg; el.classList.remove('hidden');
}

// ──────────────────────────────────────────────
// REGISTER
// ──────────────────────────────────────────────
window.handleRegister = async (e) => {
  e.preventDefault(); clearAuthMessages();
  const btn = document.getElementById('registerBtn');
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, 'users', cred.user.uid), {
      name, email, bio: '', avatarUrl: '', createdAt: serverTimestamp()
    });
    showAuthSuccess('注册成功！欢迎加入神秘空间 ✨');
    setTimeout(() => showPage('home'), 1200);
  } catch (err) {
    showAuthError(friendlyError(err.code));
  } finally {
    btn.disabled = false; btn.textContent = '创建账号';
  }
};

// ──────────────────────────────────────────────
// LOGIN
// ──────────────────────────────────────────────
window.handleLogin = async (e) => {
  e.preventDefault(); clearAuthMessages();
  const btn = document.getElementById('loginBtn');
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    await signInWithEmailAndPassword(auth, email, password);
    showPage('home');
  } catch (err) {
    showAuthError(friendlyError(err.code));
  } finally {
    btn.disabled = false; btn.textContent = '登录';
  }
};

// ──────────────────────────────────────────────
// LOGOUT
// ──────────────────────────────────────────────
window.logout = async () => {
  await signOut(auth);
  showPage('home');
};

// ──────────────────────────────────────────────
// PROFILE
// ──────────────────────────────────────────────
async function loadUserProfile(uid) {
  const snap = await getDoc(doc(db, 'users', uid));
  if (!snap.exists()) return;
  const data = snap.data();
  document.getElementById('profileName').textContent = data.name || '无名氏';
  document.getElementById('profileBio').textContent = data.bio || '还没有简介';
  if (data.avatarUrl) {
    document.getElementById('profileAvatar').src = data.avatarUrl;
  } else {
    const name = encodeURIComponent(data.name || 'U');
    document.getElementById('profileAvatar').src =
      `https://ui-avatars.com/api/?name=${name}&background=e94560&color=fff`;
  }
  document.getElementById('editName').value = data.name || '';
  document.getElementById('editBio').value = data.bio || '';
}

window.showEditProfile = () => document.getElementById('editProfileCard').classList.remove('hidden');
window.hideEditProfile = () => document.getElementById('editProfileCard').classList.add('hidden');

window.saveProfile = async () => {
  if (!currentUser) return;
  const name = document.getElementById('editName').value.trim();
  const bio = document.getElementById('editBio').value.trim();
  const errEl = document.getElementById('profileError');
  errEl.classList.add('hidden');
  try {
    await setDoc(doc(db, 'users', currentUser.uid), { name, bio }, { merge: true });
    await updateProfile(currentUser, { displayName: name });
    await loadUserProfile(currentUser.uid);
    hideEditProfile();
  } catch (err) {
    errEl.textContent = '保存失败: ' + err.message;
    errEl.classList.remove('hidden');
  }
};

// ──────────────────────────────────────────────
// AVATAR UPLOAD
// ──────────────────────────────────────────────
window.uploadAvatar = async (e) => {
  if (!currentUser) return;
  const file = e.target.files[0]; if (!file) return;
  const avatarEl = document.getElementById('profileAvatar');
  avatarEl.style.opacity = '.4';
  try {
    const storageRef = ref(storage, `avatars/${currentUser.uid}`);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);
    await setDoc(doc(db, 'users', currentUser.uid), { avatarUrl: url }, { merge: true });
    await updateProfile(currentUser, { photoURL: url });
    avatarEl.src = url;
  } catch (err) {
    alert('头像上传失败: ' + err.message);
  } finally {
    avatarEl.style.opacity = '1';
    e.target.value = '';
  }
};

// ──────────────────────────────────────────────
// POSTS — CREATE
// ──────────────────────────────────────────────
window.previewPostImage = (e) => {
  const file = e.target.files[0]; if (!file) return;
  const preview = document.getElementById('postImagePreview');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  document.querySelector('#postUploadZone .upload-icon').style.display = 'none';
  document.querySelector('#postUploadZone .upload-hint').style.display = 'none';
};

window.submitPost = async () => {
  if (!currentUser) { showPage('auth'); return; }
  const text = document.getElementById('postText').value.trim();
  const imageFile = document.getElementById('postImageInput').files[0];
  if (!text && !imageFile) { alert('请写点什么或添加图片'); return; }

  const btn = document.querySelector('#composerCard .btn-primary');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 发布中';

  try {
    let imageUrl = '';
    if (imageFile) {
      const storageRef = ref(storage, `posts/${currentUser.uid}/${Date.now()}`);
      await uploadBytes(storageRef, imageFile);
      imageUrl = await getDownloadURL(storageRef);
    }

    const userSnap = await getDoc(doc(db, 'users', currentUser.uid));
    const userData = userSnap.exists() ? userSnap.data() : {};

    await addDoc(collection(db, 'posts'), {
      uid: currentUser.uid,
      authorName: userData.name || currentUser.displayName || '匿名',
      authorAvatar: userData.avatarUrl || currentUser.photoURL || '',
      text, imageUrl,
      createdAt: serverTimestamp()
    });

    document.getElementById('postText').value = '';
    document.getElementById('postImageInput').value = '';
    const preview = document.getElementById('postImagePreview');
    preview.style.display = 'none'; preview.src = '';
    document.querySelector('#postUploadZone .upload-icon').style.display = '';
    document.querySelector('#postUploadZone .upload-hint').style.display = '';
  } catch (err) {
    alert('发布失败: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '发布';
  }
};

// ──────────────────────────────────────────────
// POSTS — FEED (real-time)
// ──────────────────────────────────────────────
function loadFeed() {
  const container = document.getElementById('feedContainer');
  const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
  onSnapshot(q, (snapshot) => {
    if (snapshot.empty) {
      container.innerHTML = '<div class="text-center text-sm" style="padding:40px 0;">还没有内容，快来第一个发布吧 ✨</div>';
      return;
    }
    container.innerHTML = snapshot.docs.map(d => renderPost(d.id, d.data())).join('');
  }, (err) => {
    container.innerHTML = '<div class="text-center text-sm" style="padding:40px 0;">加载失败，请刷新重试</div>';
    console.error(err);
  });
}

function renderPost(id, data) {
  const avatar = data.authorAvatar
    ? `<img class="post-avatar" src="${esc(data.authorAvatar)}" alt="头像">`
    : `<img class="post-avatar" src="https://ui-avatars.com/api/?name=${encodeURIComponent(data.authorName||'U')}&background=e94560&color=fff" alt="头像">`;
  const timeStr = data.createdAt ? timeAgo(data.createdAt.toDate()) : '';
  const img = data.imageUrl ? `<img class="post-image" src="${esc(data.imageUrl)}" alt="图片">` : '';
  const textHtml = data.text ? `<div class="post-content">${esc(data.text)}</div>` : '';
  const deleteBtn = (currentUser && currentUser.uid === data.uid)
    ? `<button class="btn btn-secondary btn-sm" onclick="deletePost('${id}')" style="margin-left:auto;color:var(--accent);">删除</button>` : '';
  return `
    <div class="post-card" id="post-${id}">
      <div class="post-header">
        ${avatar}
        <div>
          <div class="post-author">${esc(data.authorName || '匿名')}</div>
          <div class="post-time">${timeStr}</div>
        </div>
        ${deleteBtn}
      </div>
      ${img}
      ${textHtml}
    </div>`;
}

window.deletePost = async (id) => {
  if (!currentUser) return;
  if (!confirm('确定删除这条内容？')) return;
  await deleteDoc(doc(db, 'posts', id));
};

// ──────────────────────────────────────────────
// MY POSTS (profile page)
// ──────────────────────────────────────────────
async function loadMyPosts(uid) {
  const container = document.getElementById('myPostsContainer');
  const q = query(collection(db, 'posts'), where('uid','==',uid), orderBy('createdAt','desc'));
  try {
    const snap = await getDocs(q);
    if (snap.empty) {
      container.innerHTML = '<div class="text-sm text-center" style="padding:12px 0;">还没有发布内容</div>';
      return;
    }
    container.innerHTML = snap.docs.map(d => renderPost(d.id, d.data())).join('');
  } catch (err) {
    container.innerHTML = '<div class="text-sm text-center" style="padding:12px 0;">加载失败</div>';
  }
}

// ──────────────────────────────────────────────
// MYSTERIES — GLOBAL POOL (real-time)
// ──────────────────────────────────────────────
function loadMysteries() {
  const q = query(collection(db, 'mysteries'), orderBy('createdAt', 'desc'));
  onSnapshot(q, (snap) => {
    allMysteries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (allMysteries.length === 0) {
      // Default mysteries if none exist
      allMysteries = [
        { text: '宇宙在等待，你在等待什么？' },
        { text: '每一个深夜都是另一个人的黎明。' },
        { text: '你永远不知道，下一秒会遇见谁。' }
      ];
    }
    if (currentMysteryIndex === -1) showRandomMystery();
  });
}

function showRandomMystery() {
  if (allMysteries.length === 0) return;
  let idx;
  do { idx = Math.floor(Math.random() * allMysteries.length); }
  while (allMysteries.length > 1 && idx === currentMysteryIndex);
  currentMysteryIndex = idx;
  const el = document.getElementById('mysteryDisplay');
  el.style.opacity = '0';
  el.style.transform = 'translateY(8px)';
  el.style.transition = 'opacity .4s, transform .4s';
  setTimeout(() => {
    el.textContent = allMysteries[idx].text;
    el.style.opacity = '1'; el.style.transform = 'translateY(0)';
  }, 200);
}

window.refreshMystery = showRandomMystery;

// ──────────────────────────────────────────────
// MYSTERIES — ADD
// ──────────────────────────────────────────────
window.addMystery = async () => {
  if (!currentUser) { alert('请先登录'); showPage('auth'); return; }
  const text = document.getElementById('newMystery').value.trim();
  if (!text) { alert('请填写文案内容'); return; }
  try {
    await addDoc(collection(db, 'mysteries'), {
      uid: currentUser.uid,
      text,
      createdAt: serverTimestamp()
    });
    document.getElementById('newMystery').value = '';
    await loadMyMysteries(currentUser.uid);
  } catch (err) {
    alert('添加失败: ' + err.message);
  }
};

// ──────────────────────────────────────────────
// MYSTERIES — MY LIST (profile)
// ──────────────────────────────────────────────
async function loadMyMysteries(uid) {
  const container = document.getElementById('mysteryList');
  const q = query(collection(db, 'mysteries'), where('uid','==',uid), orderBy('createdAt','desc'));
  try {
    const snap = await getDocs(q);
    if (snap.empty) {
      container.innerHTML = '<div class="text-sm text-center" style="padding:12px 0;">暂无文案，快来添加吧</div>';
      return;
    }
    container.innerHTML = snap.docs.map(d => {
      const data = d.data();
      return `
        <div class="mystery-item" id="mystery-${d.id}">
          <div class="mystery-item-text">${esc(data.text)}</div>
          <div class="mystery-actions">
            <button class="btn btn-secondary btn-sm" onclick="editMystery('${d.id}', this)">编辑</button>
            <button class="btn btn-secondary btn-sm" style="color:var(--accent)" onclick="deleteMystery('${d.id}')">删除</button>
          </div>
        </div>`;
    }).join('');
  } catch (err) {
    container.innerHTML = '<div class="text-sm text-center">加载失败</div>';
  }
}

window.editMystery = (id, btn) => {
  const item = document.getElementById(`mystery-${id}`);
  const textEl = item.querySelector('.mystery-item-text');
  const current = textEl.textContent;
  textEl.innerHTML = `<textarea style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-family:inherit;font-size:14px;resize:vertical;">${current}</textarea>`;
  btn.textContent = '保存';
  btn.onclick = () => saveMystery(id, item);
};

async function saveMystery(id, item) {
  const textarea = item.querySelector('textarea');
  const newText = textarea.value.trim();
  if (!newText) { alert('文案不能为空'); return; }
  try {
    await setDoc(doc(db, 'mysteries', id), { text: newText }, { merge: true });
    await loadMyMysteries(currentUser.uid);
  } catch (err) {
    alert('保存失败: ' + err.message);
  }
}

window.deleteMystery = async (id) => {
  if (!confirm('确定删除这条神秘文案？')) return;
  try {
    await deleteDoc(doc(db, 'mysteries', id));
    await loadMyMysteries(currentUser.uid);
  } catch (err) {
    alert('删除失败: ' + err.message);
  }
};

// ──────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────
function esc(str = '') {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(date) {
  const diff = (Date.now() - date.getTime()) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return `${Math.floor(diff/60)} 分钟前`;
  if (diff < 86400) return `${Math.floor(diff/3600)} 小时前`;
  if (diff < 604800) return `${Math.floor(diff/86400)} 天前`;
  return date.toLocaleDateString('zh-CN');
}

function friendlyError(code) {
  const map = {
    'auth/email-already-in-use': '该邮箱已被注册',
    'auth/invalid-email': '邮箱格式不正确',
    'auth/weak-password': '密码至少需要6位',
    'auth/user-not-found': '账号不存在',
    'auth/wrong-password': '密码错误',
    'auth/invalid-credential': '邮箱或密码错误',
    'auth/too-many-requests': '操作太频繁，请稍后再试',
  };
  return map[code] || '操作失败，请重试';
}
